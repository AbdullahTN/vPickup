# vPickup — Auto-Block (Sıkıştırma) Tarifleri
# Format:
#   GİRDİ_MATERYALİ:
#     output: ÇIKTI_MATERYALİ
#     count:  KAÇ_ADET_GEREKLİ
#
# Geçersiz veya bu sürümde olmayan materyaller sessizce atlanır.
# İstediğiniz tarifi # ile yorum satırına alarak devre dışı bırakabilirsiniz.

